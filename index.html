<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wink Click Gaze System for iPad</title>
    
    <!-- 顔解析ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/build/clmtrackr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/models/model_pca_20_svm.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 疑似マウスカーソル */
        #customMousePointer {
            position: fixed;
            width: 24px;
            height: 24px;
            left: 50%;
            top: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transition: transform 0.08s ease-out, filter 0.1s ease;
        }

        /* アプリ開始時の案内画面 */
        #welcomeOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #guideMessage {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #2c3e50;
            line-height: 1.7;
            max-width: 500px;
        }

        #fatalErrorLog {
            margin-top: 15px;
            padding: 12px;
            background: #fde8e8;
            color: #e53e3e;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            max-width: 90%;
        }

        .action-button {
            padding: 15px 30px;
            font-size: 1.1rem;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,122,255,0.2);
        }

        /* デジタルズーム対応カメラ枠 */
        .camera-viewport {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 160px;
            height: 120px;
            z-index: 9999;
            border-radius: 12px;
            border: 3px solid #007aff;
            background: #000;
            overflow: hidden;
            display: none;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        #ipadCameraStream {
            width: 100%;
            height: 100%;
            /* 1.7倍にデジタルズーム（トリミング）して顔を画面に大きく表示します */
            transform: scaleX(-1) scale(1.7); 
            transform-origin: center;
            object-fit: cover;
        }

        #faceTrackingLines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* カメラ映像とぴったり重ね合わせるために同じく1.7倍にします */
            transform: scaleX(-1) scale(1.7);
            transform-origin: center;
            pointer-events: none;
        }

        /* キャリブレーション（中央1点のみ） */
        #neutralAdjustPoint {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none;
            z-index: 9500;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.7);
            cursor: pointer;
        }

        /* メインUI：キーパッド */
        #numberPad {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; /* 調整完了後に表示 */
            z-index: 500;
        }

        #padScreen {
            width: 100%;
            height: 50px;
            background: #f1f3f5;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            overflow: hidden;
            border: 1px solid #dee2e6;
        }

        .padRow {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .padBtn {
            width: 75px;
            height: 60px;
            background: #e9ecef;
            border: none;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #495057;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
        }

        /* ホバー（カーソルが乗ったとき）の視覚効果 */
        .padBtn:hover {
            background-color: #dee2e6;
        }
    </style>
</head>
<body>

    <!-- カメラ枠 -->
    <div class="camera-viewport" id="viewport-box">
        <video id="ipadCameraStream" autoplay playsinline muted></video>
        <canvas id="faceTrackingLines"></canvas>
    </div>

    <!-- 疑似マウスカーソル (矢印) -->
    <div id="customMousePointer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 3V19.5L9.75 14.25H18L4.5 3Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
        </svg>
    </div>

    <!-- 初期案内画面 -->
    <div id="welcomeOverlay">
        <div id="guideMessage">
            <h3>顔・視線追従キーパッド</h3>
            <p>ボタンを押してカメラを許可してください。</p>
            <p><small>※デジタルズームを搭載しました。お顔をカメラに近づけすぎず、普段どおりの距離で姿勢を正してください。</small></p>
        </div>
        <button class="action-button" id="init-trigger" onclick="launchFaceSystem()">システムを起動する</button>
        <div id="fatalErrorLog"></div>
    </div>

    <!-- 調整ポイント -->
    <div id="neutralAdjustPoint"></div>

    <!-- テンキーパッド -->
    <div id="numberPad">
        <div id="padScreen"></div>
        <div class="padRow">
            <button class="padBtn" onclick="pressPad('1')">1</button>
            <button class="padBtn" onclick="pressPad('2')">2</button>
            <button class="padBtn" onclick="pressPad('3')">3</button>
        </div>
        <div class="padRow">
            <button class="padBtn" onclick="pressPad('4')">4</button>
            <button class="padBtn" onclick="pressPad('5')">5</button>
            <button class="padBtn" onclick="pressPad('6')">6</button>
        </div>
        <div class="padRow">
            <button class="padBtn" onclick="pressPad('7')">7</button>
            <button class="padBtn" onclick="pressPad('8')">8</button>
            <button class="padBtn" onclick="pressPad('9')">9</button>
        </div>
        <div class="padRow">
            <button class="padBtn" style="background-color: #ff8787; color: white;" onclick="pressPad('C')">C</button>
            <button class="padBtn" onclick="pressPad('0')">0</button>
            <button class="padBtn" style="background-color: #8ce99a; color: white;" onclick="pressPad('E')">E</button>
        </div>
    </div>

    <script>
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const guideMessage = document.getElementById('guideMessage');
        const initTrigger = document.getElementById('init-trigger');
        const fatalErrorLog = document.getElementById('fatalErrorLog');
        const neutralAdjustPoint = document.getElementById('neutralAdjustPoint');
        const cursor = document.getElementById('customMousePointer');
        const numberPad = document.getElementById('numberPad');
        const padScreen = document.getElementById('padScreen');
        
        const viewportBox = document.getElementById('viewport-box');
        const cameraView = document.getElementById('ipadCameraStream');
        const drawingCanvas = document.getElementById('faceTrackingLines');
        const drawCtx = drawingCanvas.getContext('2d');

        let myFaceTracker;
        let isSetupDone = false;
        
        let centerPointX = 0;
        let centerPointY = 0;

        let activeCursorX = window.innerWidth / 2;
        let activeCursorY = window.innerHeight / 2;
        
        const speedWeightX = 22; 
        const speedWeightY = 26; 

        // ウインク判定用のカウントとクールダウン
        let closedLeftFrames = 0;
        let winkActionCooldown = 0;

        function printLog(msg, detail) {
            fatalErrorLog.style.display = 'block';
            fatalErrorLog.innerHTML = `<strong>起動エラー:</strong> ${msg}<br><small>${detail ? detail.message : ''}</small>`;
            initTrigger.style.display = 'inline-block';
            guideMessage.innerHTML = '再試行してください。';
        }

        // テンキー処理
        function pressPad(value) {
            if (value === 'C') {
                padScreen.innerText = '';
            } else if (value === 'E') {
                // 送信完了の視覚エフェクト
                padScreen.style.backgroundColor = '#b2f2bb';
                setTimeout(() => { padScreen.style.backgroundColor = '#f1f3f5'; }, 300);
            } else {
                if (padScreen.innerText.length < 12) {
                    padScreen.innerText += value;
                }
            }
        }

        // カメラと解析エンジンの完全同期起動
        async function launchFaceSystem() {
            initTrigger.style.display = 'none';
            fatalErrorLog.style.display = 'none';
            guideMessage.innerHTML = 'カメラを起動中...';

            try {
                if (typeof pModel === 'undefined') {
                    printLog('解析モデルデータの読み込みに失敗しました。', null);
                    return;
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                cameraView.srcObject = stream;

                // iOSサイズ遅延対策
                await new Promise((resolve) => {
                    cameraView.onloadedmetadata = () => resolve();
                });

                await cameraView.play();
                viewportBox.style.display = 'block';

                // 解像度を確定して適用
                const widthVal = cameraView.videoWidth || 640;
                const heightVal = cameraView.videoHeight || 480;

                cameraView.width = widthVal;
                cameraView.height = heightVal;
                drawingCanvas.width = widthVal;
                drawingCanvas.height = heightVal;

                guideMessage.innerHTML = '顔検知センサーを同期中...';

                // 骨格抽出エンジン初期化
                myFaceTracker = new clm.tracker();
                myFaceTracker.init(pModel);
                myFaceTracker.start(cameraView);

                waitAndObserveFace();

            } catch (err) {
                printLog('起動シーケンスでエラーが発生しました。', err);
            }
        }

        // 顔感知待機
        function waitAndObserveFace() {
            const landmarkCoords = myFaceTracker.getCurrentPosition();
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);

            if (landmarkCoords && landmarkCoords.length > 0) {
                myFaceTracker.draw(drawingCanvas); // 顔認識線を重ねて描画
                guideMessage.innerHTML = '顔を感知しました！調整を行います。';
                beginCalibration();
            } else {
                guideMessage.innerHTML = `お顔を探しています...<br><small>ズーム調整を行いました。近づきすぎず、普段の距離で真っ直ぐ画面を見てください。</small>`;
                setTimeout(waitAndObserveFace, 100);
            }
        }

        // 調整開始
        function beginCalibration() {
            guideMessage.innerHTML = '姿勢を伸ばし、<b>画面中央の赤い丸をじっと見つめながら</b>、丸をタップしてください。';
            welcomeOverlay.style.background = 'rgba(255, 255, 255, 0.3)';
            welcomeOverlay.style.pointerEvents = 'none';
            neutralAdjustPoint.style.display = 'block';
        }

        // 中心点を設定
        neutralAdjustPoint.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            const landmarkCoords = myFaceTracker.getCurrentPosition();
            
            if (landmarkCoords && landmarkCoords[62]) {
                centerPointX = landmarkCoords[62][0];
                centerPointY = landmarkCoords[62][1];
                
                isSetupDone = true;
                neutralAdjustPoint.style.display = 'none';
                welcomeOverlay.style.display = 'none';
                cursor.style.display = 'block';
                numberPad.style.display = 'block'; // キーパッドを表示

                executeCursorMove();
            } else {
                alert("位置情報を取得できませんでした。正面を向き、明るい部屋でもう一度お試しください。");
            }
        });

        // 2点間の距離を求める関数
        function getDistanceOfPoints(pt1, pt2) {
            return Math.sqrt(Math.pow(pt1[0] - pt2[0], 2) + Math.pow(pt1[1] - pt2[1], 2));
        }

        // クリックシミュレーション
        function performPointerClick() {
            // カーソル座標の真下にあるHTML要素を取得する
            const elementUnderCursor = document.elementFromPoint(activeCursorX, activeCursorY);
            if (elementUnderCursor) {
                // カーソルのクリック演出（少し大きくなり、一瞬色反転）
                cursor.style.transform = 'scale(1.6)';
                cursor.style.filter = 'hue-rotate(120deg)'; // 一瞬緑色に
                
                setTimeout(() => {
                    cursor.style.transform = 'scale(1)';
                    cursor.style.filter = 'none';
                }, 200);

                // 要素をクリック
                elementUnderCursor.click();
            }
        }

        // 追従＆ウインク判定ループ
        function executeCursorMove() {
            if (!isSetupDone) return;

            requestAnimationFrame(executeCursorMove);
            const landmarkCoords = myFaceTracker.getCurrentPosition();
            
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);

            if (landmarkCoords && landmarkCoords[62]) {
                // 顔の骨格を描画し続ける
                myFaceTracker.draw(drawingCanvas);

                // --- 1. カーソル追従計算 ---
                const currentX = landmarkCoords[62][0];
                const currentY = landmarkCoords[62][1];

                const distanceX = -(currentX - centerPointX);
                const distanceY = currentY - centerPointY;

                const goalX = (window.innerWidth / 2) + (distanceX * speedWeightX);
                const goalY = (window.innerHeight / 2) + (distanceY * speedWeightY);

                // 加減速フィルター
                activeCursorX = activeCursorX * 0.7 + goalX * 0.3;
                activeCursorY = activeCursorY * 0.7 + goalY * 0.3;

                const finalX = Math.max(0, Math.min(window.innerWidth - 24, activeCursorX));
                const finalY = Math.max(0, Math.min(window.innerHeight - 24, activeCursorY));

                cursor.style.left = finalX + 'px';
                cursor.style.top = finalY + 'px';

                // --- 2. 左目ウインク判定 ---
                // landmarkCoords[29], [31] はユーザーから見て左目（画面上は右側）の上下のまぶた
                // landmarkCoords[28], [30] は左目の目頭・目尻
                const leftEyeHeight = getDistanceOfPoints(landmarkCoords[29], landmarkCoords[31]);
                const leftEyeWidth = getDistanceOfPoints(landmarkCoords[28], landmarkCoords[30]);
                const leftEyeRatio = leftEyeHeight / leftEyeWidth; // 目が開いている縦横比

                // ユーザーから見て右目（画面上は左側）
                const rightEyeHeight = getDistanceOfPoints(landmarkCoords[24], landmarkCoords[26]);
                const rightEyeWidth = getDistanceOfPoints(landmarkCoords[23], landmarkCoords[25]);
                const rightEyeRatio = rightEyeHeight / rightEyeWidth;

                // ウインクチャタリング（誤動作）防止
                if (winkActionCooldown > 0) {
                    winkActionCooldown--;
                } else {
                    // 左目の比率が著しく低く（閉じている）、かつ右目がしっかり開いている場合
                    if (leftEyeRatio < 0.16 && rightEyeRatio > 0.22) {
                        closedLeftFrames++;
                        if (closedLeftFrames >= 2) { // 2フレーム以上連続して目を閉じたらクリックと見なす
                            performPointerClick();
                            winkActionCooldown = 25; // 連続入力防止クールダウン（約0.8秒）
                            closedLeftFrames = 0;
                        }
                    } else {
                        closedLeftFrames = 0;
                    }
                }
            }
        }

        window.addEventListener('resize', () => {
            if (typeof myFaceTracker !== 'undefined' && myFaceTracker.isReady()) {
                myFaceTracker.resize();
            }
        });
    </script>
</body>
</html>
