<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face & Gaze Tracker for iPad (Detect Fix)</title>
    
    <!-- 高互換の顔認識ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/build/clmtrackr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/models/model_pca_20_svm.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 疑似PC用マウスカーソル */
        #custom-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            left: 50%;
            top: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transition: transform 0.08s ease-out; /* よりレスポンシブに */
        }

        /* スタート画面 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #instruction {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
            max-width: 500px;
        }

        #error-log {
            margin-top: 15px;
            padding: 10px;
            background: #ffe5e5;
            color: #cc0000;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            max-width: 90%;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* カメラプレビュー */
        #webgazerVideoFeed {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 140px;
            height: 105px;
            z-index: 9999;
            border-radius: 8px;
            border: 2px solid #007aff;
            background: #000;
            transform: scaleX(-1); /* 鏡効果 */
            object-fit: cover;
            display: none;
        }

        /* キャリブレーション用の真ん中のドット */
        #calibration-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none;
            z-index: 9500;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- カメラ用ビデオ要素 -->
    <video id="webgazerVideoFeed" autoplay playsinline muted></video>

    <!-- 疑似PC用カーソル (SVG) -->
    <div id="custom-cursor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 3V19.5L9.75 14.25H18L4.5 3Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
        </svg>
    </div>

    <!-- 案内用画面 -->
    <div id="overlay">
        <div id="instruction">
            <h3>顔・視線追従デモ (認識修正版)</h3>
            <p>ボタンを押してカメラを許可してください。</p>
            <p><small>※お顔が左上の青い枠内に収まるよう、50cm〜60cmほど離れて姿勢を正してください。</small></p>
        </div>
        <button id="start-btn" onclick="initAndStart()">カメラを起動する</button>
        <div id="error-log"></div>
    </div>

    <!-- キャリブレーション（中央1点のみ） -->
    <div id="calibration-dot"></div>

    <script>
        const overlay = document.getElementById('overlay');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start-btn');
        const errorLog = document.getElementById('error-log');
        const calDot = document.getElementById('calibration-dot');
        const cursor = document.getElementById('custom-cursor');
        const videoElement = document.getElementById('webgazerVideoFeed');

        let ctrack;
        let isCalibrated = false;
        
        let neutralX = 0;
        let neutralY = 0;

        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        const sensitivityX = 20; // 感度を少し上げました
        const sensitivityY = 24; 

        function showError(message, err) {
            errorLog.style.display = 'block';
            errorLog.innerHTML = `<strong>エラー:</strong> ${message}<br><small>${err ? err.message : ''}</small>`;
            startBtn.style.display = 'inline-block';
            instruction.innerHTML = '再試行してください。';
        }

        async function initAndStart() {
            startBtn.style.display = 'none';
            errorLog.style.display = 'none';
            instruction.innerHTML = 'カメラを準備中...';

            try {
                // 1. カメラ起動
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                videoElement.srcObject = stream;

                // 【最重要】iOS Safari対策：ビデオのサイズ（メタデータ）が完全に読み込まれるのを待つ
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        resolve();
                    };
                });

                // 2. ビデオを再生
                await videoElement.play();
                videoElement.style.display = 'block';

                // 【重要】iPadに「実際のビデオサイズ」を明示的に認識させ、0pxバグを防ぐ
                videoElement.width = videoElement.videoWidth || 640;
                videoElement.height = videoElement.videoHeight || 480;

                instruction.innerHTML = '顔認識システムを同期中...';

                // 3. clmtrackrの初期化
                ctrack = new clm.tracker();
                ctrack.init(pModel);
                ctrack.start(videoElement);

                // 感知待機ループへ
                checkFaceDetection();

            } catch (err) {
                showError('カメラの初期起動に失敗しました。', err);
            }
        }

        // 顔の検出判定
        function checkFaceDetection() {
            const positions = ctrack.getCurrentPosition();
            if (positions && positions.length > 0) {
                // 顔を検出できたら調整画面を表示
                setupCalibration();
            } else {
                instruction.innerHTML = 'お顔がまだ感知されていません。<br>明るい場所で、カメラの正面に顔を向けてお待ちください。';
                setTimeout(checkFaceDetection, 300); // 判定間隔を少し狭めて反応を良くしました
            }
        }

        // 調整案内
        function setupCalibration() {
            instruction.innerHTML = 'お顔を感知しました！<br><br>背筋を伸ばし、<b>画面中央の「赤い丸」をじっと見つめながら</b>、丸をタップしてください。';
            overlay.style.background = 'rgba(255, 255, 255, 0.3)';
            overlay.style.pointerEvents = 'none';
            calDot.style.display = 'flex';
        }

        // 基準値の登録
        calDot.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            const positions = ctrack.getCurrentPosition();
            
            if (positions && positions[62]) {
                // 鼻頭の座標を基準に設定
                neutralX = positions[62][0];
                neutralY = positions[62][1];
                
                isCalibrated = true;
                calDot.style.display = 'none';
                overlay.style.display = 'none';
                cursor.style.display = 'block';

                trackingLoop();
            } else {
                alert("位置の取得に失敗しました。正面を向いてもう一度お試しください。");
            }
        });

        // 追従ループ
        function trackingLoop() {
            if (!isCalibrated) return;

            requestAnimationFrame(trackingLoop);
            const positions = ctrack.getCurrentPosition();

            if (positions && positions[62]) {
                const currentX = positions[62][0];
                const currentY = positions[62][1];

                const diffX = -(currentX - neutralX);
                const diffY = currentY - neutralY;

                const targetX = (window.innerWidth / 2) + (diffX * sensitivityX);
                const targetY = (window.innerHeight / 2) + (diffY * sensitivityY);

                // なめらかフィルター
                cursorX = cursorX * 0.7 + targetX * 0.3;
                cursorY = cursorY * 0.7 + targetY * 0.3;

                const finalX = Math.max(0, Math.min(window.innerWidth - 24, cursorX));
                const finalY = Math.max(0, Math.min(window.innerHeight - 24, cursorY));

                cursor.style.left = finalX + 'px';
                cursor.style.top = finalY + 'px';
            }
        }
    </script>
</body>
</html>
