<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gaze Tracker for iPad (DB Bypass)</title>
    
    <!-- 【超重要】WebGazerが読み込まれる前に、iPadのデータベース機能を強制的に「非対応」に偽装します -->
    <script>
        try {
            // IndexedDBとWebSQLを無効化し、エラーを起こす処理自体を完全にバイパス（回避）させます
            Object.defineProperty(window, 'indexedDB', {
                get: function() { return undefined; },
                configurable: true
            });
            Object.defineProperty(window, 'openDatabase', {
                get: function() { return undefined; },
                configurable: true
            });
        } catch (e) {
            console.warn("DB bypass failed", e);
        }
    </script>

    <!-- 配信元をより安定した公式CDN（cdnjs）に変更します -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webgazer/2.0.1/webgazer.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 疑似PC用マウスカーソル */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            left: 50%;
            top: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* スタート画面・案内用 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #instruction {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
            max-width: 500px;
        }

        #error-log {
            margin-top: 15px;
            padding: 10px;
            background: #ffe5e5;
            color: #cc0000;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            word-break: break-all;
            text-align: left;
            max-width: 90%;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 事前に配置しておくカメラ用ビデオ要素 */
        #webgazerVideoFeed {
            position: fixed !important;
            top: 15px !important;
            left: 15px !important;
            width: 160px !important;
            height: 120px !important;
            z-index: 9999 !important;
            border-radius: 8px !important;
            border: 2px solid #007aff !important;
            background: #000 !important;
            transform: scaleX(-1) !important; /* 鏡効果 */
            object-fit: cover !important;     /* ズームトリミング */
            display: none;
        }

        /* キャリブレーション用のドット */
        #calibration-dot {
            position: fixed;
            width: 35px;
            height: 35px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none;
            z-index: 9500;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- ビデオ要素 -->
    <video id="webgazerVideoFeed" autoplay playsinline muted></video>

    <!-- 疑似PC用カーソル (SVG) -->
    <div id="custom-cursor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 3V19.5L9.75 14.25H18L4.5 3Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
        </svg>
    </div>

    <!-- 案内用画面 -->
    <div id="overlay">
        <div id="instruction">
            <h3>視線追従デモ (偽装保護版)</h3>
            <p>ボタンを押すと、すぐにカメラの使用許可を求められます。「許可」を選択してください。</p>
            <p><small>※お顔全体が左上の青い枠内に収まるよう、50cm〜60cmほど離れて位置を調整してください。</small></p>
        </div>
        <button id="start-btn" onclick="initAndStart()">カメラを起動して調整を始める</button>
        <div id="error-log"></div>
    </div>

    <!-- キャリブレーション用ドット -->
    <div id="calibration-dot">5</div>

    <script>
        const overlay = document.getElementById('overlay');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start-btn');
        const errorLog = document.getElementById('error-log');
        const calDot = document.getElementById('calibration-dot');
        const cursor = document.getElementById('custom-cursor');
        const videoElement = document.getElementById('webgazerVideoFeed');

        const points = [
            {x: 0.1, y: 0.1}, // 左上
            {x: 0.9, y: 0.1}, // 右上
            {x: 0.5, y: 0.5}, // 中央
            {x: 0.1, y: 0.9}, // 左下
            {x: 0.9, y: 0.9}  // 右下
        ];

        let currentPointIndex = 0;
        let tapCount = 0;
        const requiredTaps = 5;

        function showError(message, err) {
            errorLog.style.display = 'block';
            errorLog.innerHTML = `<strong>エラーが発生しました:</strong><br>${message}<br><small>${err ? (err.name + ': ' + err.message) : ''}</small>`;
            startBtn.style.display = 'inline-block';
            instruction.innerHTML = '再試行してください。';
        }

        // カメラ起動シーケンス
        async function initAndStart() {
            startBtn.style.display = 'none';
            errorLog.style.display = 'none';
            instruction.innerHTML = 'カメラを起動しています...';

            try {
                // 1. カメラストリーム取得
                const constraints = { 
                    video: { facingMode: 'user' }, 
                    audio: false 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // 2. 再生開始
                videoElement.srcObject = stream;
                await videoElement.play();
                videoElement.style.display = 'block';

                instruction.innerHTML = '視線解析システムを準備しています...';

                // 3. WebGazer初期設定
                webgazer.saveDataAcrossSessions(false); 

                webgazer.setGazeListener(function(data, elapsedTime) {
                    if (data == null) return;
                    cursor.style.left = data.x + 'px';
                    cursor.style.top = data.y + 'px';
                });

                webgazer.showPredictionPoints(false);

                // 4. WebGazer開始
                await webgazer.begin();
                
                setupCalibration();

            } catch (err) {
                showError('起動プロセスでエラーが発生しました。', err);
            }
        }

        // キャリブレーション
        function setupCalibration() {
            instruction.innerHTML = '調整を開始します。<br>赤いドットを見つめながら、<b>ドットを5回</b>タップしてください。';
            overlay.style.background = 'rgba(255, 255, 255, 0.3)';
            overlay.style.pointerEvents = 'none';
            
            currentPointIndex = 0;
            tapCount = 0;
            showNextDot();
        }

        function showNextDot() {
            if (currentPointIndex < points.length) {
                const pt = points[currentPointIndex];
                const x = window.innerWidth * pt.x;
                const y = window.innerHeight * pt.y;

                calDot.style.left = x + 'px';
                calDot.style.top = y + 'px';
                calDot.style.display = 'flex';
                calDot.innerText = requiredTaps - tapCount;
            } else {
                finishCalibration();
            }
        }

        calDot.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            tapCount++;
            
            if (tapCount >= requiredTaps) {
                currentPointIndex++;
                tapCount = 0;
            }
            showNextDot();
        });

        function finishCalibration() {
            calDot.style.display = 'none';
            overlay.style.display = 'none';
            cursor.style.display = 'block';
        }

        window.addEventListener('resize', () => {
            if (typeof webgazer !== 'undefined' && webgazer.isReady()) {
                webgazer.resize();
            }
        });
    </script>
</body>
</html>
