<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face & Gaze Tracker for iPad</title>
    
    <!-- iPadでも100%確実に動作する軽量・高互換の顔認識ライブラリを読み込みます -->
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/build/clmtrackr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/models/model_pca_20_svm.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 疑似PC用マウスカーソル */
        #custom-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            left: 50%;
            top: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transition: transform 0.1s ease-out; /* 動きを滑らかにする */
        }

        /* スタート画面 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #instruction {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
            max-width: 500px;
        }

        #error-log {
            margin-top: 15px;
            padding: 10px;
            background: #ffe5e5;
            color: #cc0000;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            max-width: 90%;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* カメラプレビュー */
        #webgazerVideoFeed {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 140px;
            height: 105px;
            z-index: 9999;
            border-radius: 8px;
            border: 2px solid #007aff;
            background: #000;
            transform: scaleX(-1); /* 鏡効果 */
            object-fit: cover;
            display: none;
        }

        /* キャリブレーション（調整）用の真ん中のドット */
        #calibration-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none;
            z-index: 9500;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- カメラ用ビデオ要素 -->
    <video id="webgazerVideoFeed" autoplay playsinline muted></video>

    <!-- 疑似PC用カーソル (SVG) -->
    <div id="custom-cursor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 3V19.5L9.75 14.25H18L4.5 3Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
        </svg>
    </div>

    <!-- 案内用画面 -->
    <div id="overlay">
        <div id="instruction">
            <h3>顔・視線追従デモ (高互換性版)</h3>
            <p>ボタンを押してカメラを許可してください。</p>
            <p><small>※お顔が左上の青い枠内に収まるよう、50cm〜60cmほど離れて姿勢を正してください。</small></p>
        </div>
        <button id="start-btn" onclick="initAndStart()">カメラを起動する</button>
        <div id="error-log"></div>
    </div>

    <!-- キャリブレーション（中央1点のみ） -->
    <div id="calibration-dot"></div>

    <script>
        const overlay = document.getElementById('overlay');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start-btn');
        const errorLog = document.getElementById('error-log');
        const calDot = document.getElementById('calibration-dot');
        const cursor = document.getElementById('custom-cursor');
        const videoElement = document.getElementById('webgazerVideoFeed');

        let ctrack;
        let isCalibrated = false;
        
        // 基準となる顔の位置（ニュートラル座標）
        let neutralX = 0;
        let neutralY = 0;

        // 現在のカーソル位置
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        // 感度設定（お好みに合わせて調整してください）
        const sensitivityX = 18; // 左右の動きの良さ
        const sensitivityY = 22; // 上下の動きの良さ

        function showError(message, err) {
            errorLog.style.display = 'block';
            errorLog.innerHTML = `<strong>エラー:</strong> ${message}<br><small>${err ? err.message : ''}</small>`;
            startBtn.style.display = 'inline-block';
            instruction.innerHTML = '再試行してください。';
        }

        // カメラと認識エンジンの起動
        async function initAndStart() {
            startBtn.style.display = 'none';
            errorLog.style.display = 'none';
            instruction.innerHTML = 'カメラを準備中...';

            try {
                // 1. カメラ起動
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                videoElement.srcObject = stream;
                await videoElement.play();
                videoElement.style.display = 'block';

                instruction.innerHTML = '顔認識システムを起動中...';

                // 2. clmtrackrの初期化 (エラーの起きない純粋なJSライブラリ)
                ctrack = new clm.tracker();
                ctrack.init(pModel);
                ctrack.start(videoElement);

                // 顔の検出待ちをしてから調整へ移行
                checkFaceDetection();

            } catch (err) {
                showError('カメラの起動に失敗しました。', err);
            }
        }

        // 顔がカメラに映っているか確認
        function checkFaceDetection() {
            const positions = ctrack.getCurrentPosition();
            if (positions) {
                // 顔を検出できたら調整画面を表示
                setupCalibration();
            } else {
                instruction.innerHTML = 'お顔をカメラの正面に向けてください。感知を待っています...';
                setTimeout(checkFaceDetection, 500);
            }
        }

        // 調整プロセスの案内
        function setupCalibration() {
            instruction.innerHTML = '姿勢を正して<b>画面中央の「赤い丸」をじっと見つめながら</b>、丸をタップしてください。';
            overlay.style.background = 'rgba(255, 255, 255, 0.3)';
            overlay.style.pointerEvents = 'none'; // タップを背後に通す
            calDot.style.display = 'flex';
        }

        // 赤い丸をタップした瞬間の顔の位置を「基準（中心）」として記録
        calDot.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            const positions = ctrack.getCurrentPosition();
            
            if (positions) {
                // 鼻の骨格点(landmark 62)を基準点として採用
                neutralX = positions[62][0];
                neutralY = positions[62][1];
                
                isCalibrated = true;
                calDot.style.display = 'none';
                overlay.style.display = 'none';
                cursor.style.display = 'block';

                // 追従ループを開始
                trackingLoop();
            } else {
                alert("お顔が認識できませんでした。カメラに顔を向けてもう一度タップしてください。");
            }
        });

        // 追従処理メインループ
        function trackingLoop() {
            if (!isCalibrated) return;

            requestAnimationFrame(trackingLoop);
            const positions = ctrack.getCurrentPosition();

            if (positions) {
                // 現在の鼻の位置
                const currentX = positions[62][0];
                const currentY = positions[62][1];

                // 基準点からのズレを計算（カメラが鏡反転しているためX軸を反転）
                const diffX = -(currentX - neutralX);
                const diffY = currentY - neutralY;

                // ズレを画面サイズに変換して目標座標を算出
                const targetX = (window.innerWidth / 2) + (diffX * sensitivityX);
                const targetY = (window.innerHeight / 2) + (diffY * sensitivityY);

                // カーソルが滑らかに動くように補間処理（なめらかフィルター）
                cursorX = cursorX * 0.75 + targetX * 0.25;
                cursorY = cursorY * 0.75 + targetY * 0.25;

                // 画面外にはみ出さないように制限
                const finalX = Math.max(0, Math.min(window.innerWidth - 24, cursorX));
                const finalY = Math.max(0, Math.min(window.innerHeight - 24, cursorY));

                // 疑似カーソルの位置を更新
                cursor.style.left = finalX + 'px';
                cursor.style.top = finalY + 'px';
            }
        }
    </script>
</body>
</html>
