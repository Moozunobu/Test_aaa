<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Tracker (Debug Overlay)</title>
    
    <!-- 軽量顔認識ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/build/clmtrackr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/models/model_pca_20_svm.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 疑似PC用マウスカーソル */
        #custom-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            left: 50%;
            top: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transition: transform 0.08s ease-out;
        }

        /* スタート画面 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #instruction {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
            max-width: 500px;
        }

        #error-log {
            margin-top: 15px;
            padding: 10px;
            background: #ffe5e5;
            color: #cc0000;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            max-width: 90%;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ビデオとデバッグ用キャンバスを重ねて配置するコンテナ */
        .video-container {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 140px;
            height: 105px;
            z-index: 9999;
            border-radius: 8px;
            border: 2px solid #007aff;
            background: #000;
            overflow: hidden;
            display: none; /* 最初は非表示 */
        }

        #webgazerVideoFeed {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* 鏡効果 */
            object-fit: cover;
        }

        /* 認識している顔の線を重ねて表示する透明キャンバス */
        #debug-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* ビデオに合わせて鏡反転 */
            pointer-events: none;
        }

        /* キャリブレーション用ドット */
        #calibration-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none;
            z-index: 9500;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ビデオと顔認識線を描くキャンバスを重ねて配置 -->
    <div class="video-container" id="video-box">
        <video id="webgazerVideoFeed" autoplay playsinline muted></video>
        <canvas id="debug-canvas"></canvas>
    </div>

    <!-- 疑似PC用カーソル (SVG) -->
    <div id="custom-cursor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 3V19.5L9.75 14.25H18L4.5 3Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
        </svg>
    </div>

    <!-- 案内用画面 -->
    <div id="overlay">
        <div id="instruction">
            <h3>顔・視線追従デモ (デバッグ表示版)</h3>
            <p>ボタンを押してカメラを許可してください。</p>
            <p><small>※学校等の通信制限がある場合、稀に顔データがロードされない場合があります。</small></p>
        </div>
        <button id="start-btn" onclick="initAndStart()">カメラを起動する</button>
        <div id="error-log"></div>
    </div>

    <!-- キャリブレーション（中央1点のみ） -->
    <div id="calibration-dot"></div>

    <script>
        const overlay = document.getElementById('overlay');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start-btn');
        const errorLog = document.getElementById('error-log');
        const calDot = document.getElementById('calibration-dot');
        const cursor = document.getElementById('custom-cursor');
        
        const videoBox = document.getElementById('video-box');
        const videoElement = document.getElementById('webgazerVideoFeed');
        const debugCanvas = document.getElementById('debug-canvas');
        const debugCtx = debugCanvas.getContext('2d');

        let ctrack;
        let isCalibrated = false;
        
        let neutralX = 0;
        let neutralY = 0;

        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        const sensitivityX = 20; 
        const sensitivityY = 24; 

        function showError(message, err) {
            errorLog.style.display = 'block';
            errorLog.innerHTML = `<strong>エラー:</strong> ${message}<br><small>${err ? err.message : ''}</small>`;
            startBtn.style.display = 'inline-block';
            instruction.innerHTML = '再試行してください。';
        }

        async function initAndStart() {
            startBtn.style.display = 'none';
            errorLog.style.display = 'none';
            instruction.innerHTML = 'カメラを起動しています...';

            try {
                // 顔認識ライブラリのロード確認
                if (typeof pModel === 'undefined') {
                    showError('顔認識用のモデルデータが読み込めていません。ネットワーク環境や制限等によりダウンロードが遮断されている可能性があります。', null);
                    return;
                }

                // 1. カメラ起動
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                videoBox.style.display = 'block'; // プレビュー枠を表示

                // 2. 【超重要】iPadのカメラサイズが正しく反映されるまで100msごとにループ待機する
                instruction.innerHTML = 'iPadのカメラ解像度を測定中...';
                let waitCount = 0;
                while ((videoElement.videoWidth === 0 || videoElement.videoHeight === 0) && waitCount < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    waitCount++;
                }

                const w = videoElement.videoWidth || 640;
                const h = videoElement.videoHeight || 480;

                // ビデオと、重ねるキャンバスのサイズを確実に同期させる
                videoElement.width = w;
                videoElement.height = h;
                debugCanvas.width = w;
                debugCanvas.height = h;

                instruction.innerHTML = `お顔を検出しています... (カメラサイズ: ${w}x${h})`;

                // 3. clmtrackrの初期化
                ctrack = new clm.tracker();
                ctrack.init(pModel);
                ctrack.start(videoElement);

                // 顔認識待機（描画デバッグあり）のループへ
                checkFaceDetectionWithDebug();

            } catch (err) {
                showError('カメラの起動または初期化中にエラーが発生しました。', err);
            }
        }

        // 顔の検出判定（左上に緑色の骨格線を描画します）
        function checkFaceDetectionWithDebug() {
            const positions = ctrack.getCurrentPosition();
            
            // 毎フレーム描画をクリア
            debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);

            if (positions && positions.length > 0) {
                // 顔を検出できたら、左上のビデオの中に「緑の骨格線」を描画する
                ctrack.draw(debugCanvas);
                
                // 調整画面へ進む
                setupCalibration();
            } else {
                instruction.innerHTML = `お顔を探しています...<br><small>左上の枠内に顔が収まるよう、明るい部屋でカメラを真っ直ぐ見つめてください。</small>`;
                // 検出できるまでループ
                setTimeout(checkFaceDetectionWithDebug, 100);
            }
        }

        // 調整案内
        function setupCalibration() {
            instruction.innerHTML = 'お顔の感知に成功しました！<br><br>姿勢を正し、<b>画面中央の「赤い丸」をじっと見つめながら</b>、丸をタップしてください。';
            overlay.style.background = 'rgba(255, 255, 255, 0.3)';
            overlay.style.pointerEvents = 'none';
            calDot.style.display = 'flex';
        }

        // 基準値の登録
        calDot.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            const positions = ctrack.getCurrentPosition();
            
            if (positions && positions[62]) {
                neutralX = positions[62][0];
                neutralY = positions[62][1];
                
                isCalibrated = true;
                calDot.style.display = 'none';
                overlay.style.display = 'none';
                cursor.style.display = 'block';

                trackingLoop();
            } else {
                alert("お顔の位置ずれを取得できませんでした。正面を向いてもう一度お試しください。");
            }
        });

        // 追従ループ（ここでも骨格線を常に描画し続けます）
        function trackingLoop() {
            if (!isCalibrated) return;

            requestAnimationFrame(trackingLoop);
            const positions = ctrack.getCurrentPosition();
            
            debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);

            if (positions && positions[62]) {
                // 顔の骨格を左上に描き続ける（動いているかどうかの目印）
                ctrack.draw(debugCanvas);

                const currentX = positions[62][0];
                const currentY = positions[62][1];

                const diffX = -(currentX - neutralX);
                const diffY = currentY - neutralY;

                const targetX = (window.innerWidth / 2) + (diffX * sensitivityX);
                const targetY = (window.innerHeight / 2) + (diffY * sensitivityY);

                // 滑らかフィルター
                cursorX = cursorX * 0.7 + targetX * 0.3;
                cursorY = cursorY * 0.7 + targetY * 0.3;

                const finalX = Math.max(0, Math.min(window.innerWidth - 24, cursorX));
                const finalY = Math.max(0, Math.min(window.innerHeight - 24, cursorY));

                cursor.style.left = finalX + 'px';
                cursor.style.top = finalY + 'px';
            }
        }
    </script>
</body>
</html>
